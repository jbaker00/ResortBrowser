name: ResortBrowser
options:
  bundleIdPrefix: com.globalvibes
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "15"

packages:
  FirebaseSDK:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "10.0.0"

targets:
  ResortBrowser:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - ResortBrowser
    resources:
      - path: ResortBrowser/Assets.xcassets
      - path: ResortBrowser/Info.plist
      - path: GoogleService-Info.plist
    dependencies:
      - package: FirebaseSDK
        product: FirebaseDatabase
      - package: FirebaseSDK
        product: FirebaseFirestore
      - package: FirebaseSDK
        product: FirebaseFirestoreSwift
      - package: FirebaseSDK
        product: FirebaseAnalytics
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.globalvibes.ResortBrowser
        DEVELOPMENT_TEAM: G3P9A8Z2NP
        SWIFT_VERSION: "5.0"
        INFOPLIST_FILE: ResortBrowser/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        MARKETING_VERSION: "2.2"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  ResortBrowserMac:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - ResortBrowser
    resources:
      - path: ResortBrowser/Assets.xcassets
      - path: GoogleService-Info.plist
      - path: ResortBrowser/macOS-Info.plist
    dependencies:
      - package: FirebaseSDK
        product: FirebaseDatabase
      - package: FirebaseSDK
        product: FirebaseFirestore
      - package: FirebaseSDK
        product: FirebaseFirestoreSwift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.globalvibes.ResortBrowserMac
        DEVELOPMENT_TEAM: G3P9A8Z2NP
        SWIFT_VERSION: "5.0"
        INFOPLIST_FILE: ResortBrowser/macOS-Info.plist
        MARKETING_VERSION: "2.2"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
